name: Sync upstream

on:
  workflow_dispatch:
  schedule:
    - cron: "23 19 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/ghcruise/LimbusCompany-IOS-Localization.git 2>/dev/null || git remote set-url upstream https://github.com/ghcruise/LimbusCompany-IOS-Localization.git
          git fetch upstream main

      - name: Merge upstream
        run: git merge --no-edit upstream/main

      - name: Repoint runtime URLs
        run: node scripts/repoint-admin05-urls.js

      - name: Regenerate Loon plugins
        run: node scripts/generate-loon-plugin.js

      - name: Audit runtime URLs
        run: node scripts/repoint-admin05-urls.js

      - name: Commit and push changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "Sync upstream localization assets"
          fi

          git push
